<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Taberna del Mímico - Versión 2 (Mejorada)</title>
    <style>
        body { margin: 0; padding: 0; background-color: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-container { box-shadow: 0 0 20px rgba(0,0,0,0.5); border: 4px solid #34495e; border-radius: 8px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
</head>
<body>
    <div id="game-container"></div>
    <script>
        const GameState = {
            gold: 200, souls: 0,
            save() { localStorage.setItem('mimic_tavern_save_v2', JSON.stringify({gold: this.gold, souls: this.souls})); },
            load() { const saved = localStorage.getItem('mimic_tavern_save_v2'); if (saved) { const data = JSON.parse(saved); this.gold = data.gold; this.souls = data.souls; } }
        };

        const MAP_CONFIG = { tileWidth: 64, tileHeight: 64, rows: 20, cols: 11, offsetX: 8 };
        const PATH_POINTS = [
            {x: 10, y: 1}, {x: 9, y: 1}, {x: 8, y: 1}, {x: 7, y: 1}, {x: 6, y: 1}, {x: 5, y: 1}, {x: 4, y: 1}, {x: 3, y: 1}, {x: 2, y: 1}, {x: 1, y: 1},
            {x: 1, y: 2}, {x: 1, y: 3}, {x: 1, y: 4}, {x: 1, y: 5},
            {x: 2, y: 5}, {x: 3, y: 5}, {x: 4, y: 5}, {x: 5, y: 5}, {x: 6, y: 5}, {x: 7, y: 5}, {x: 8, y: 5}, {x: 9, y: 5},
            {x: 9, y: 6}, {x: 9, y: 7}, {x: 9, y: 8}, {x: 9, y: 9},
            {x: 8, y: 9}, {x: 7, y: 9}, {x: 6, y: 9}, {x: 5, y: 9}, {x: 4, y: 9}, {x: 3, y: 9}, {x: 2, y: 9}, {x: 1, y: 9},
            {x: 1, y: 10}, {x: 1, y: 11}, {x: 1, y: 12}, {x: 1, y: 13},
            {x: 2, y: 13}, {x: 3, y: 13}, {x: 4, y: 13}, {x: 5, y: 13}, {x: 6, y: 13}, {x: 7, y: 13}, {x: 8, y: 13}, {x: 9, y: 13},
            {x: 9, y: 14}, {x: 9, y: 15}, {x: 9, y: 16}, {x: 9, y: 17},
            {x: 8, y: 17}, {x: 7, y: 17}, {x: 6, y: 17}, {x: 5, y: 17}, {x: 4, y: 17}, {x: 3, y: 17}, {x: 2, y: 17}, {x: 1, y: 17}
        ];
        function getWorldPos(col, row) { return { x: MAP_CONFIG.offsetX + col * 64 + 32, y: row * 64 + 32 }; }

        class Hero extends Phaser.GameObjects.Container {
            constructor(scene, path) {
                const startPos = getWorldPos(path[0].x, path[0].y);
                super(scene, startPos.x, startPos.y);
                this.scene = scene; this.path = path; this.pathIndex = 0; this.hp = 50; this.maxHp = 50;
                this.sprite = scene.add.sprite(0, 0, 'hero_knight'); this.add(this.sprite);
                this.hpBar = scene.add.graphics(); this.add(this.hpBar); this.updateHpBar();
                scene.add.existing(this); scene.physics.add.existing(this);
            }
            updateHpBar() { this.hpBar.clear(); this.hpBar.fillStyle(0x000000); this.hpBar.fillRect(-20, -35, 40, 5); this.hpBar.fillStyle(0xff0000); this.hpBar.fillRect(-20, -35, 40 * (this.hp / this.maxHp), 5); }
            takeDamage(amount) { this.hp -= amount; this.updateHpBar(); if (this.hp <= 0) { this.scene.events.emit('hero_defeated', 10); this.destroy(); } }
            update(time, delta) {
                if (this.pathIndex >= this.path.length - 1) { this.destroy(); return; }
                const target = getWorldPos(this.path[this.pathIndex + 1].x, this.path[this.pathIndex + 1].y);
                const distance = Phaser.Math.Distance.Between(this.x, this.y, target.x, target.y);
                if (distance < 5) this.pathIndex++; else {
                    const angle = Phaser.Math.Angle.Between(this.x, this.y, target.x, target.y);
                    this.x += Math.cos(angle) * 120 * (delta / 1000); this.y += Math.sin(angle) * 120 * (delta / 1000);
                }
            }
        }

        class Tower extends Phaser.GameObjects.Container {
            constructor(scene, x, y) {
                super(scene, x, y); this.scene = scene; this.lastFired = 0;
                this.sprite = scene.add.sprite(0, 0, 'tower_slime'); this.add(this.sprite);
                scene.add.existing(this);
            }
            update(time, enemies) {
                if (time < this.lastFired + 800) return;
                const target = enemies.find(e => e.active && Phaser.Math.Distance.Between(this.x, this.y, e.x, e.y) <= 150);
                if (target) {
                    const line = this.scene.add.graphics(); line.lineStyle(3, 0xffff00, 1); line.lineBetween(this.x, this.y, target.x, target.y);
                    this.scene.tweens.add({ targets: line, alpha: 0, duration: 200, onComplete: () => line.destroy() });
                    target.takeDamage(15); this.lastFired = time;
                }
            }
        }

        class Invasor extends Phaser.GameObjects.Sprite {
            constructor(scene) {
                const startY = Phaser.Math.Between(200, 1000);
                super(scene, -50, startY, 'invasor'); this.scene = scene; scene.add.existing(this); this.setInteractive();
                this.on('pointerdown', () => { GameState.souls += 5; GameState.save(); scene.events.emit('ui_update'); this.destroy(); });
            }
            update(delta) { this.x += 200 * (delta / 1000); if (this.x > 770) this.destroy(); }
        }

        class UIScene extends Phaser.Scene {
            constructor() { super('UIScene'); }
            create() {
                const mainGame = this.scene.get('GameScene');
                this.add.graphics().fillStyle(0x000000, 0.8).fillRect(0, 0, 720, 80).setDepth(100);
                this.goldText = this.add.text(20, 20, `Oro: ${GameState.gold}`, { fontSize: '32px', fill: '#f1c40f', fontStyle: 'bold' }).setDepth(101);
                this.soulsText = this.add.text(350, 20, `Almas: ${GameState.souls}`, { fontSize: '32px', fill: '#9b59b6', fontStyle: 'bold' }).setDepth(101);

                const shopBtn = this.add.container(360, 1100).setInteractive(new Phaser.Geom.Rectangle(-150, -30, 300, 60), Phaser.Geom.Rectangle.Contains);
                const btnBg = this.add.graphics().fillStyle(0x27ae60, 1).fillRoundedRect(-150, -30, 300, 60, 10).lineStyle(2, 0xffffff, 1).strokeRoundedRect(-150, -30, 300, 60, 10);
                const shopTxt = this.add.text(0, 0, 'Comprar Monstruo (50 Oro)', { fontSize: '22px', fill: '#ffffff', fontStyle: 'bold' }).setOrigin(0.5);
                shopBtn.add([btnBg, shopTxt]);

                shopBtn.on('pointerdown', () => {
                    if (GameState.gold >= 50) { mainGame.isPlacingTower = true; shopTxt.setText('Selecciona en el mapa...'); shopTxt.setFill('#f1c40f'); }
                    else { shopTxt.setText('¡Falta Oro!'); this.time.delayedCall(1000, () => shopTxt.setText('Comprar Monstruo (50 Oro)')); }
                });

                mainGame.events.on('ui_update', () => { this.goldText.setText(`Oro: ${GameState.gold}`); this.soulsText.setText(`Almas: ${GameState.souls}`); });
                mainGame.events.on('placement_finished', () => { shopTxt.setText('Comprar Monstruo (50 Oro)'); shopTxt.setFill('#ffffff'); });
            }
        }

        class GameScene extends Phaser.Scene {
            constructor() { super('GameScene'); this.enemies = []; this.towers = []; this.invasors = []; this.nextWaveTime = 0; this.nextInvasorTime = 5000; }
            preload() {
                this.load.image('tile_grass', 'https://raw.githubusercontent.com/photonstorm/phaser3-examples/master/public/assets/skies/space2.png');
                this.load.image('tile_path', 'https://raw.githubusercontent.com/photonstorm/phaser3-examples/master/public/assets/tilemaps/tiles/tmw_desert_spacing.png');
                this.load.image('hero_knight', 'https://raw.githubusercontent.com/photonstorm/phaser3-examples/master/public/assets/sprites/phaser-dude.png');
                this.load.image('tower_slime', 'https://raw.githubusercontent.com/photonstorm/phaser3-examples/master/public/assets/sprites/slime.png');
                this.load.image('invasor', 'https://raw.githubusercontent.com/photonstorm/phaser3-examples/master/public/assets/sprites/aqua_ball.png');
            }
            create() {
                GameState.load();
                for (let r = 0; r < 20; r++) for (let c = 0; c < 11; c++) { const pos = getWorldPos(c, r); this.add.image(pos.x, pos.y, 'tile_grass').setDisplaySize(64, 64); }
                PATH_POINTS.forEach(p => { const pos = getWorldPos(p.x, p.y); this.add.image(pos.x, pos.y, 'tile_path').setDisplaySize(64, 64); });
                this.scene.launch('UIScene');
                this.events.on('hero_defeated', (g) => { GameState.gold += g; GameState.souls += 1; GameState.save(); this.events.emit('ui_update'); });
                this.input.on('pointerdown', (p) => {
                    if (!this.isPlacingTower) return;
                    const c = Math.floor((p.x - 8) / 64), r = Math.floor(p.y / 64);
                    if (c<0 || c>=11 || r<0 || r>=20 || PATH_POINTS.some(path => path.x === c && path.y === r)) return;
                    const isOccupied = this.towers.some(t => {
                        const tCol = Math.floor((t.x - 8) / 64);
                        const tRow = Math.floor(t.y / 64);
                        return tCol === c && tRow === r;
                    });
                    if (isOccupied) return;
                    const pos = getWorldPos(c, r); this.towers.push(new Tower(this, pos.x, pos.y));
                    GameState.gold -= 50; GameState.save(); this.events.emit('ui_update'); this.isPlacingTower = false; this.events.emit('placement_finished');
                });
            }
            update(time, delta) {
                if (time > this.nextWaveTime) { this.enemies.push(new Hero(this, PATH_POINTS)); this.nextWaveTime = time + 3000; }
                if (time > this.nextInvasorTime) { this.invasors.push(new Invasor(this)); this.nextInvasorTime = time + Phaser.Math.Between(10000, 20000); }
                this.invasors = this.invasors.filter(i => { if (i.active) { i.update(delta); return true; } return false; });
                this.enemies = this.enemies.filter(e => { if (e.active) { e.update(time, delta); return true; } return false; });
                this.towers.forEach(t => t.update(time, this.enemies));
            }
        }

        new Phaser.Game({ type: Phaser.AUTO, width: 720, height: 1280, parent: 'game-container', scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH }, physics: { default: 'arcade' }, scene: [GameScene, UIScene] });
    </script>
</body>
</html>
